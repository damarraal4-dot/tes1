<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TrackStat — Fleet Command Center</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    body { font-family: 'Inter', sans-serif; background-color: #09090b; color: #f4f4f5; }
    .bg-grid {
      position: fixed; top: 0; left: 0; right: 0; bottom: 0;
      background-size: 50px 50px;
      background-image: linear-gradient(to right, rgba(255,255,255,0.03) 1px, transparent 1px),
                        linear-gradient(to bottom, rgba(255,255,255,0.03) 1px, transparent 1px);
      z-index: -1; pointer-events: none;
    }
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: #27272a; border-radius: 10px; }
    ::-webkit-scrollbar-thumb:hover { background: #3f3f46; }
    details > summary { list-style: none; }
    details > summary::-webkit-details-marker { display: none; }
    .pulse-dot { animation: pulse 2s cubic-bezier(.4,0,.6,1) infinite; }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.4} }
  </style>
</head>
<body class="p-4 md:p-8 min-h-screen">
<div class="bg-grid"></div>
<div class="max-w-7xl mx-auto">

  <!-- Header -->
  <header class="flex flex-col md:flex-row justify-between items-start md:items-center pb-8 mb-8 border-b border-white/10">
    <div class="flex items-center gap-3 mb-4 md:mb-0">
      <div class="bg-white text-black font-bold p-2 rounded-lg leading-none tracking-tight text-sm">TS</div>
      <div>
        <h1 class="text-2xl font-bold tracking-tight text-white flex items-center gap-2">
          Track<span class="text-gray-400 font-medium">Stat</span>
        </h1>
        <p class="text-sm text-gray-500 mt-1">Real-time Roblox Fleet Analytics</p>
      </div>
    </div>
    <div class="flex items-center gap-4">
      <div class="flex items-center gap-2 bg-green-500/10 border border-green-500/20 px-4 py-2 rounded-full">
        <span class="relative flex h-2.5 w-2.5">
          <span class="pulse-dot absolute inline-flex h-full w-full rounded-full bg-green-400 opacity-75"></span>
          <span class="relative inline-flex rounded-full h-2.5 w-2.5 bg-green-500"></span>
        </span>
        <span class="text-sm font-medium text-green-400"><span id="hdr-accounts">0</span> Accounts Online</span>
      </div>
      <div class="text-xs text-gray-600 font-mono" id="hdr-uptime">up 0h 0m 0s</div>
    </div>
  </header>

  <!-- Global stat cards (mirrors index.html top bar) -->
  <div class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-6 gap-4 mb-8">
    <div class="bg-[#121214] p-5 rounded-2xl border border-white/5 shadow-lg">
      <p class="text-xs font-semibold uppercase tracking-wider text-gray-400 mb-2">Catch Rate</p>
      <p class="text-2xl font-bold text-white" id="stat-fph">0 <span class="text-sm font-normal text-gray-500">FPH</span></p>
      <p class="text-xs text-blue-400 mt-1" id="stat-fpm">0.0 FPM</p>
    </div>
    <div class="bg-[#121214] p-5 rounded-2xl border border-white/5 shadow-lg">
      <p class="text-xs font-semibold uppercase tracking-wider text-gray-400 mb-2">Total EVO</p>
      <p class="text-2xl font-bold text-white mt-1" id="stat-evo">0</p>
    </div>
    <div class="bg-[#121214] p-5 rounded-2xl border border-white/5 shadow-lg">
      <p class="text-xs font-semibold uppercase tracking-wider text-gray-400 mb-2">SCTB Fish</p>
      <p class="text-2xl font-bold text-white mt-1" id="stat-sctb">0</p>
    </div>
    <div class="bg-[#121214] p-5 rounded-2xl border border-white/5 shadow-lg col-span-2 md:col-span-1">
      <p class="text-xs font-semibold uppercase tracking-wider text-gray-400 mb-2">Last Sync</p>
      <p class="text-sm font-mono text-white mt-1 leading-relaxed" id="stat-time">—</p>
    </div>
    <div class="bg-[#121214] p-5 rounded-2xl border border-white/5 shadow-lg col-span-2 md:col-span-2">
      <p class="text-xs font-semibold uppercase tracking-wider text-gray-400 mb-2">Servers Active</p>
      <p class="text-2xl font-bold text-white mt-1" id="stat-servers">0</p>
    </div>
  </div>

  <!-- Server grid (one card per serverId, mirrors index.html server cards) -->
  <div id="server-grid" class="grid grid-cols-1 md:grid-cols-2 xl:grid-cols-3 gap-6 items-start">
    <p class="text-gray-500 animate-pulse col-span-full text-center py-20 font-medium">Synchronizing fleet data...</p>
  </div>
</div>

<script>
function fmt(n) { return Number(n).toLocaleString(); }
function secAgo(s) {
  if (s < 60) return `${s}s ago`;
  if (s < 3600) return `${Math.floor(s/60)}m ago`;
  return `${Math.floor(s/3600)}h ago`;
}

async function fetchState() {
  try {
    const res  = await fetch('/api/state');
    const data = await res.json();

    // Global header
    document.getElementById('hdr-accounts').textContent = data.total || 0;
    document.getElementById('hdr-uptime').textContent   = `up ${data.uptime}`;
    document.getElementById('stat-fph').innerHTML = `${data.total_fph} <span class="text-sm font-normal text-gray-500">FPH</span>`;
    document.getElementById('stat-fpm').textContent = `${data.total_fpm} FPM`;
    document.getElementById('stat-evo').textContent  = fmt(data.total_evo);
    document.getElementById('stat-sctb').textContent = fmt(data.total_sctb);
    document.getElementById('stat-time').textContent = data.timestamp;
    document.getElementById('stat-servers').textContent = Object.keys(data.servers).length;

    const grid = document.getElementById('server-grid');
    if (grid.innerHTML.includes('Synchronizing')) grid.innerHTML = '';

    // Per-server cards
    for (const [sid, srv] of Object.entries(data.servers).sort()) {

      // T7 fish list
      let t7Html = '';
      if (srv.t7_fish && srv.t7_fish.length > 0) {
        t7Html = `<div class="mt-3 border-t border-white/5 pt-3">
          <p class="text-[10px] uppercase tracking-wider text-gray-500 mb-2 font-semibold">🐟 T7 Secret Fish</p>`;
        for (const f of srv.t7_fish) {
          const vtag = f.variant ? ` <span class="text-purple-400">[${f.variant}]</span>` : '';
          t7Html += `<div class="flex justify-between text-xs py-0.5">
            <span class="text-gray-300">${f.name}${vtag}</span>
            <span class="font-bold text-teal-400">${f.qty}</span>
          </div>`;
        }
        t7Html += `</div>`;
      }

      // Player rows
      let playerHtml = '';
      for (const p of srv.players) {
        playerHtml += `
        <div class="flex flex-col py-2 border-t border-white/5 hover:bg-white/[0.02] transition-colors rounded px-2 -mx-2">
          <div class="flex justify-between items-center">
            <div class="flex items-center gap-2">
              <div class="w-1.5 h-1.5 rounded-full bg-green-500"></div>
              <span class="text-sm font-medium text-gray-200">${p.name}</span>
            </div>
            <span class="text-[10px] text-gray-500 font-mono">${secAgo(p.last_seen)}</span>
          </div>
          <div class="grid grid-cols-3 gap-1 mt-1.5 text-[11px] text-gray-500 font-mono">
            <span>🎣 ${fmt(p.fishCaught)}</span>
            <span>⚡ ${p.fpm} fpm</span>
            <span>💎 evo:${p.evo}</span>
          </div>
          <div class="flex gap-3 mt-1 text-[11px] text-gray-600 font-mono truncate">
            <span title="${p.rod}">🎣 ${p.rod.length > 20 ? p.rod.slice(0,18)+'…' : p.rod}</span>
            <span class="truncate" title="${p.quest}">📋 ${p.quest.length > 28 ? p.quest.slice(0,26)+'…' : p.quest}</span>
          </div>
        </div>`;
      }

      const exsumHtml = `
        <div class="flex flex-col"><span class="font-bold text-white">${srv.players.length}</span><span>Bots</span></div>
        <div class="flex flex-col"><span class="font-bold text-blue-400">${srv.fpm}</span><span>FPM</span></div>
        <div class="flex flex-col"><span class="font-bold text-yellow-400">${srv.fph}</span><span>FPH</span></div>
        <div class="flex flex-col"><span class="font-bold text-purple-400">${fmt(srv.evo)}</span><span>EVO</span></div>
        <div class="flex flex-col"><span class="font-bold text-teal-400">${fmt(srv.sctb)}</span><span>SCTB</span></div>`;

      const serverStatHtml = `
        <div class="bg-black/30 rounded-xl p-3 mb-2 border border-white/5">
          <div class="flex justify-between items-center mb-1 pb-1 border-b border-white/5 text-sm">
            <span class="font-mono text-blue-400">${srv.fpm} FPM | ${srv.fph} FPH</span>
            <span class="text-teal-400 font-semibold">${srv.players.length} bots</span>
          </div>
          <div class="flex justify-between items-center text-sm font-medium">
            <span class="flex items-center gap-1.5">💎 ${fmt(srv.evo)} EVO</span>
            <span class="flex items-center gap-1.5">🐟 ${fmt(srv.sctb)} SCTB</span>
          </div>
        </div>${t7Html}`;

      let card = document.getElementById(`card-${sid}`);
      if (!card) {
        grid.insertAdjacentHTML('beforeend', `
        <details id="card-${sid}" open class="group bg-[#121214] rounded-2xl border border-white/5 shadow-xl hover:border-white/10 transition-colors h-fit">
          <summary class="p-5 cursor-pointer outline-none select-none">
            <div class="flex justify-between items-center">
              <div class="flex items-center gap-3">
                <div class="bg-white/5 p-2 rounded-lg border border-white/5 text-sm">🖥️</div>
                <h2 class="text-lg font-semibold text-white tracking-tight font-mono">Server <span class="text-blue-400">${sid}</span></h2>
              </div>
              <svg class="w-5 h-5 text-gray-500 transition-transform group-open:rotate-180" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"/></svg>
            </div>
            <div id="exsum-${sid}" class="mt-4 grid grid-cols-5 gap-1 text-center text-[10px] text-gray-500 group-open:hidden border-t border-white/5 pt-3">
              ${exsumHtml}
            </div>
          </summary>
          <div class="px-5 pb-5 pt-0 mt-[-10px]">
            <div id="stats-${sid}">${serverStatHtml}</div>
            <div id="players-${sid}" class="max-h-72 overflow-y-auto pr-1">${playerHtml}</div>
          </div>
        </details>`);
      } else {
        document.getElementById(`exsum-${sid}`).innerHTML   = exsumHtml;
        document.getElementById(`stats-${sid}`).innerHTML   = serverStatHtml;
        document.getElementById(`players-${sid}`).innerHTML = playerHtml;
      }
    }
  } catch(e) {
    console.error('Fetch error:', e);
  }
}

fetchState();
setInterval(fetchState, 10000); // refresh every 10s
</script>
</body>
</html>
